<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="container">
        <h1>Feedback Form</h1>


        <form id="Feedback form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <div class="tooltip">Your Name</div>
                <div class="error"></div>
    </div>
    
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <div class="tooltip">Your Email</div>
                <div class="error"></div>
            </div>

            <div class="form-group">
                <label for="feedback">Feedback:</label>
                <textarea id="feedback" rows="5" maxlength="500" required></textarea>
                <div class="tooltip">Your Feedback</div>
                <div class="char-count">0/500</div>
                <div class="error"></div>
            </div>

            <button type="submit">Submit</button>
        </form>

        <div id="confirmation" class="confirmation-message">
            <h2>Thank you for your feedback!</h2>
            <p>Your feedback has been received and will be reviewed.</p>
        </div>
    </div>

    <script src="cp_1.js"></script>
</body>
</html>
